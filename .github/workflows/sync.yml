name: Sync from Federal Newsletter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run sync script
        run: python .github/scripts/sync_federal.py

      - name: Commit updated newsletter
        run: |
          git config user.name "arista-westerncanada"
          git config user.email "actions@github.com"
          git add docs/index.md
          git diff --staged --quiet || git commit -m "Sync software updates from Federal newsletter"
          git push
